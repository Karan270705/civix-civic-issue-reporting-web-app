<section class="issue-preview section" id="issues">
  <div class="container">
    <div class="preview-header">
      <div>
        <span class="section-label">Recent Issues</span>
        <h2 class="section-title">What's happening in your city</h2>
      </div>
      <a routerLink="/feed" class="btn btn-secondary btn-md view-all">
        View all issues
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>

    <div class="preview-grid">
      @for (issue of previewIssues(); track issue.id) {
        <app-issue-card [issue]="issue" (vote)="onVote($event)"></app-issue-card>
      }
    </div>
  </div>
</section>
