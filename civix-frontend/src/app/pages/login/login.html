<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <span class="auth-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      </span>
      Civix
    </div>

    <!-- Header -->
    <div class="auth-header">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to report and track civic issues.</p>
    </div>

    <!-- Form -->
    <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <!-- Server error -->
      @if (serverError()) {
        <div class="auth-error" role="alert">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {{ serverError() }}
        </div>
      }

      <!-- Email -->
      <div class="field">
        <label class="field-label" for="login-email">Email address</label>
        <div class="input-wrap">
          <input
            id="login-email"
            type="email"
            formControlName="email"
            placeholder="you@example.com"
            autocomplete="email"
            [class.is-error]="emailError"
          />
        </div>
        @if (emailError) {
          <span class="field-error">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><text x="11" y="16" font-size="12" fill="white" text-anchor="middle">!</text></svg>
            {{ emailError }}
          </span>
        }
      </div>

      <!-- Password -->
      <div class="field">
        <label class="field-label" for="login-password">Password</label>
        <div class="input-wrap">
          <input
            id="login-password"
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
            class="has-toggle"
            [class.is-error]="passwordError"
          />
          <button type="button" class="pw-toggle" (click)="togglePassword()" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
            @if (showPassword()) {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
        @if (passwordError) {
          <span class="field-error">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><text x="11" y="16" font-size="12" fill="white" text-anchor="middle">!</text></svg>
            {{ passwordError }}
          </span>
        }
        <div class="field-hint">
          <a href="#" (click)="$event.preventDefault()">Forgot password?</a>
        </div>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="auth-submit"
        id="login-submit-btn"
        [disabled]="form.invalid || loading()"
      >
        @if (loading()) {
          <span class="spinner"></span>
          Signing in…
        } @else {
          Sign in
        }
      </button>

    </form>

    <!-- Switch -->
    <div class="auth-switch">
      Don't have an account? <a routerLink="/signup">Sign up</a>
    </div>

  </div>
</div>
